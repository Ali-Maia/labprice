<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LabPrice | Orçamento</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="index.html"><div class="brand-mark">⚙</div><div><strong>LabPrice</strong><span>precificação maker</span></div></a>
        <nav class="nav">
          <a href="dashboard.html">Painel</a>
          <a href="products.html">Catálogo</a>
          <a href="login.html" data-auth="logged-out" class="nav-pill primary">Entrar</a>
          <button class="nav-pill ghost hidden" data-auth="logged-in" data-logout>Sair</button>
        </nav>
      </div>
    </header>

    <main class="section">
      <div class="container">
        <div class="hero-card">
          <span class="kicker">Motor de precificação</span>
          <h1>Monte o orçamento com os parâmetros da peça.</h1>
          <p>O formulário conversa com a rota /quote/calculate e mostra o detalhamento completo do cálculo.</p>
        </div>

        <div class="grid two" style="margin-top:18px; align-items:start;">
          <div class="form-card">
            <h2>Dados do orçamento</h2>
            <form id="quoteForm" class="form-grid">
              <div class="grid two">
                <div class="field"><label for="gramsUsed">Gramas usadas</label><input class="input" id="gramsUsed" type="number" step="0.01" min="0" required></div>
                <div class="field"><label for="costPerKg">Custo por kg</label><input class="input" id="costPerKg" type="number" step="0.01" min="0" required></div>
              </div>
              <div class="grid two">
                <div class="field"><label for="powerWatts">Potência (W)</label><input class="input" id="powerWatts" type="number" step="0.01" min="0" required></div>
                <div class="field"><label for="timeHours">Tempo de impressão (h)</label><input class="input" id="timeHours" type="number" step="0.01" min="0" required></div>
              </div>
              <div class="grid two">
                <div class="field"><label for="tarifaKwh">Tarifa kWh</label><input class="input" id="tarifaKwh" type="number" step="0.01" min="0" required></div>
                <div class="field"><label for="markupPercentage">Markup (%)</label><input class="input" id="markupPercentage" type="number" step="0.01" min="0" max="100" required></div>
              </div>
              <div class="grid two">
                <div class="field"><label for="additionalCosts">Custos adicionais</label><input class="input" id="additionalCosts" type="number" step="0.01" min="0" value="0"></div>
                <div class="field"><label for="packaging">Embalagem</label><input class="input" id="packaging" type="number" step="0.01" min="0" value="0"></div>
              </div>
              <div class="field"><label for="platformFeePercentage">Taxa da plataforma (%)</label><input class="input" id="platformFeePercentage" type="number" step="0.01" min="0" max="99" value="0"></div>

              <hr class="sep">
              <label class="switch"><input type="checkbox" id="enableDepreciation"> Ativar depreciação</label>
              <div class="grid two">
                <div class="field"><label for="machineValue">Valor da máquina</label><input class="input" id="machineValue" type="number" step="0.01" min="0"></div>
                <div class="field"><label for="lifeHours">Vida útil (h)</label><input class="input" id="lifeHours" type="number" step="0.01" min="0"></div>
              </div>

              <label class="switch"><input type="checkbox" id="enableRiskTax"> Ativar taxa de risco</label>
              <div class="field"><label for="failurePercentage">Falha estimada (%)</label><input class="input" id="failurePercentage" type="number" step="0.01" min="0" max="100"></div>

              <label class="switch"><input type="checkbox" id="enablePostProcessing"> Ativar pós-processamento</label>
              <div class="grid two">
                <div class="field"><label for="postTimeHours">Tempo de pós (h)</label><input class="input" id="postTimeHours" type="number" step="0.01" min="0"></div>
                <div class="field"><label for="hourlyRate">Taxa/hora</label><input class="input" id="hourlyRate" type="number" step="0.01" min="0"></div>
              </div>

              <button class="btn btn-primary" type="submit">Calcular orçamento</button>
            </form>
          </div>

          <div class="panel">
            <h2>Resultado</h2>
            <div id="quoteResult" class="muted">Preencha os campos e calcule.</div>
            <div id="saveQuoteSection" class="hidden" style="margin-top:18px;">
              <hr class="sep">
              <div class="field">
                <label for="productName">Nome do produto</label>
                <input class="input" id="productName" type="text" placeholder="Ex.: Suporte articulado">
              </div>
              <button class="btn btn-secondary" id="saveQuoteButton" type="button">Salvar como produto</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/quote.js"></script>
</body>
</html>
